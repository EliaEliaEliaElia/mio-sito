<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Password Generator | ToolFast</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .generator-container {
            text-align: left;
            margin-top: 2rem;
        }
        .password-display-group {
            display: flex;
            gap: 10px;
            margin-bottom: 1.5rem;
        }
        #password-output {
            flex: 1;
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.2rem;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            background: #f8fafc;
            letter-spacing: 1px;
        }
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 1.5rem;
        }
        .option-item {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .strength-meter {
            height: 8px;
            width: 100%;
            background: #e2e8f0;
            border-radius: 4px;
            margin-bottom: 2rem;
            overflow: hidden;
        }
        #strength-bar {
            height: 100%;
            width: 0%;
            transition: all 0.3s ease;
        }
        .length-slider-group {
            margin-bottom: 1.5rem;
        }
        input[type="range"] {
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <header></header>

    <main class="container">
        <section class="tool-card">
            <h1>Password Generator</h1>
            <p>Generate secure, random passwords instantly.</p>

            <div class="generator-container">
                <div class="password-display-group">
                    <input type="text" id="password-output" readonly placeholder="Your Password">
                    <button id="copy-btn" class="btn-primary" style="width: auto;">Copy</button>
                </div>

                <div style="display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 5px;">
                    <span>Strength:</span>
                    <span id="strength-text">Empty</span>
                </div>
                <div class="strength-meter">
                    <div id="strength-bar"></div>
                </div>

                <div class="length-slider-group">
                    <label style="display: flex; justify-content: space-between;">
                        Length: <span id="length-val">12</span>
                    </label>
                    <input type="range" id="length-slider" min="6" max="50" value="12">
                </div>

                <div class="options-grid">
                    <label class="option-item">
                        <input type="checkbox" id="upper" checked> Uppercase
                    </label>
                    <label class="option-item">
                        <input type="checkbox" id="lower" checked> Lowercase
                    </label>
                    <label class="option-item">
                        <input type="checkbox" id="numbers" checked> Numbers
                    </label>
                    <label class="option-item">
                        <input type="checkbox" id="symbols"> Symbols
                    </label>
                </div>

                <button id="generate-btn" class="btn-primary" style="width: 100%;">Generate Password</button>
            </div>
        </section>
    </main>

    <footer></footer>

    <script src="components.js"></script>
    <script>
        const charSets = {
            upper: "ABCDEFGHIJKLMNOPQRSTUVWXYZ",
            lower: "abcdefghijklmnopqrstuvwxyz",
            numbers: "0123456789",
            symbols: "!@#$%^&*()_+~|}{[]:;?><,./-="
        };

        const generateBtn = document.getElementById('generate-btn');
        const slider = document.getElementById('length-slider');
        const lengthVal = document.getElementById('length-val');
        const output = document.getElementById('password-output');
        const copyBtn = document.getElementById('copy-btn');

        // Update length text on slider move
        slider.addEventListener('input', () => lengthVal.innerText = slider.value);

        function generatePassword() {
            let combinedChars = "";
            if (document.getElementById('upper').checked) combinedChars += charSets.upper;
            if (document.getElementById('lower').checked) combinedChars += charSets.lower;
            if (document.getElementById('numbers').checked) combinedChars += charSets.numbers;
            if (document.getElementById('symbols').checked) combinedChars += charSets.symbols;

            if (combinedChars === "") {
                output.value = "Select an option!";
                return;
            }

            let password = "";
            const length = slider.value;
            for (let i = 0; i < length; i++) {
                const randomIndex = Math.floor(Math.random() * combinedChars.length);
                password += combinedChars[randomIndex];
            }

            output.value = password;
            updateStrength(password);
        }

        function updateStrength(pwd) {
            const bar = document.getElementById('strength-bar');
            const text = document.getElementById('strength-text');
            let strength = 0;

            if (pwd.length > 8) strength += 25;
            if (pwd.length > 15) strength += 25;
            if (/[0-9]/.test(pwd)) strength += 20;
            if (/[!@#$%^&*()]/.test(pwd)) strength += 30;

            bar.style.width = strength + "%";
            
            if (strength < 40) {
                bar.style.background = "#f87171"; // Red
                text.innerText = "Weak";
            } else if (strength < 75) {
                bar.style.background = "#fbbf24"; // Yellow
                text.innerText = "Medium";
            } else {
                bar.style.background = "#4ade80"; // Green
                text.innerText = "Strong";
            }
        }

        copyBtn.addEventListener('click', () => {
            if (output.value && output.value !== "Select an option!") {
                navigator.clipboard.writeText(output.value);
                const originalText = copyBtn.innerText;
                copyBtn.innerText = "Copied!";
                setTimeout(() => copyBtn.innerText = originalText, 1500);
            }
        });

        generateBtn.addEventListener('click', generatePassword);
        
        // Auto-generate on load
        generatePassword();
    </script>
</body>
</html>
