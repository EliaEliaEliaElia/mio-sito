<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Converter | ToolFast</title>
    <link rel="stylesheet" href="style.css">
    <style>
        textarea {
            width: 100%;
            height: 250px;
            padding: 20px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1.1rem;
            margin-bottom: 20px;
            resize: vertical;
        }

        .button-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn-tool {
            padding: 12px;
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-tool:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .action-footer {
            display: flex;
            gap: 10px;
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <header></header>

    <main class="container">
        <section class="tool-card">
            <h1>Case Converter</h1>
            <p>Change the capitalization of your text instantly.</p>

            <textarea id="text-input" placeholder="Type or paste your text here..."></textarea>

            <div class="button-group">
                <button class="btn-tool" onclick="convert('upper')">UPPERCASE</button>
                <button class="btn-tool" onclick="convert('lower')">lowercase</button>
                <button class="btn-tool" onclick="convert('sentence')">Sentence case</button>
                <button class="btn-tool" onclick="convert('capitalized')">Capitalized Case</button>
                <button class="btn-tool" onclick="convert('inverse')">aLtErNaTiNg cAsE</button>
            </div>

            <div class="action-footer">
                <button class="btn-primary" onclick="copyResult()">Copy to Clipboard</button>
                <button class="btn-secondary" onclick="clearText()">Clear</button>
            </div>
        </section>
    </main>

    <footer></footer>

    <script src="components.js"></script>
    <script>
        const input = document.getElementById('text-input');

        function convert(type) {
            let text = input.value;
            if (!text) return;

            switch(type) {
                case 'upper':
                    text = text.toUpperCase();
                    break;
                case 'lower':
                    text = text.toLowerCase();
                    break;
                case 'sentence':
                    text = text.toLowerCase().replace(/(^\s*\w|[\.\!\?]\s*\w)/g, c => c.toUpperCase());
                    break;
                case 'capitalized':
                    text = text.toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
                    break;
                case 'inverse':
                    text = text.split('').map((c, i) => i % 2 === 0 ? c.toLowerCase() : c.toUpperCase()).join('');
                    break;
            }
            input.value = text;
        }

        function copyResult() {
            input.select();
            document.execCommand('copy');
            const btn = event.target;
            const original = btn.innerText;
            btn.innerText = "Copied!";
            setTimeout(() => btn.innerText = original, 1500);
        }

        function clearText() {
            input.value = '';
        }
    </script>
</body>
</html>
