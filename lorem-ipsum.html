<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lorem Ipsum Generator | ToolFast</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .controls-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: flex-end;
            margin-bottom: 25px;
            text-align: left;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        input[type="number"], select {
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
        }

        #output-text {
            width: 100%;
            height: 350px;
            padding: 20px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            background-color: #f8fafc;
            font-family: 'Georgia', serif;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 20px;
            overflow-y: auto;
            text-align: left;
            white-space: pre-wrap;
        }

        .options-row {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

    <header></header>

    <main class="container">
        <section class="tool-card">
            <h1>Lorem Ipsum Generator</h1>
            <p>Generate professional placeholder text for your design layouts.</p>

            <div class="controls-row">
                <div class="control-group">
                    <label>Quantity</label>
                    <input type="number" id="quantity" value="3" min="1" max="50" style="width: 80px;">
                </div>
                <div class="control-group">
                    <label>Type</label>
                    <select id="type">
                        <option value="paragraphs">Paragraphs</option>
                        <option value="sentences">Sentences</option>
                        <option value="words">Words</option>
                    </select>
                </div>
                <button class="btn-primary" onclick="generateLorem()" style="margin-bottom: 0;">Generate</button>
            </div>

            <div class="options-row">
                <input type="checkbox" id="start-with-lorem" checked>
                <label for="start-with-lorem">Start with "Lorem ipsum dolor sit amet..."</label>
            </div>

            <div id="output-text"></div>

            <div style="display: flex; gap: 10px;">
                <button class="btn-secondary" onclick="copyResult()" style="flex: 1;">Copy to Clipboard</button>
            </div>
        </section>
    </main>

    <footer></footer>

    <script src="components.js"></script>
    <script>
        const phrases = [
            "lorem ipsum dolor sit amet, consectetur adipiscing elit",
            "sed do eiusmod tempor incididunt ut labore et dolore magna aliqua",
            "ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat",
            "duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur",
            "excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum",
            "curabitur pretium tincidunt lacus. nulla gravida orci a odio",
            "nullam varius, turpis et commodo pharetra, est eros bibendum elit, nec luctus magna felis sollicitudin mauris",
            "integer in mauris eu nibh euismod gravida",
            "duis ac tellus et risus vulputate vehicula",
            "donec lobortis risus a elit. etiam tempor",
            "ut ullamcorper, ligula eu tempor congue, eros est euismod turpis, id tincidunt sapien risus a quam",
            "maecenas fermentum consequat mi. donec fermentum. pellentesque malesuada nulla a mi",
            "duis sapien nunc, commodo et, interdum suscipit, sollicitudin et, dolor",
            "etiam non quam. vivamus elementum semper nisi",
            "aenean vulputate eleifend tellus. aenean leo ligula, porttitor eu, consequat vitae, eleifend ac, enim",
            "aliquam lorem ante, dapibus in, viverra quis, feugiat a, tellus",
            "phasellus viverra nulla ut metus varius laoreet",
            "quisque rutrum. aenean imperdiet",
            "etiam ultricies nisi vel augue",
            "curabitur ullamcorper ultricies nisi. nam eget dui. etiam rhoncus"
        ];

        function generateLorem() {
            const quantity = parseInt(document.getElementById('quantity').value);
            const type = document.getElementById('type').value;
            const startWithLorem = document.getElementById('start-with-lorem').checked;
            const output = document.getElementById('output-text');
            
            let result = [];

            if (type === 'paragraphs') {
                for (let i = 0; i < quantity; i++) {
                    let p = [];
                    const sentenceCount = Math.floor(Math.random() * 4) + 4;
                    for (let j = 0; j < sentenceCount; j++) {
                        p.push(getRandomPhrase());
                    }
                    result.push(p.join('. ') + '.');
                }
                result = result.join('\n\n');
            } 
            else if (type === 'sentences') {
                for (let i = 0; i < quantity; i++) {
                    result.push(getRandomPhrase());
                }
                result = result.join('. ') + '.';
            } 
            else if (type === 'words') {
                let words = [];
                while (words.length < quantity) {
                    words.push(...getRandomPhrase().split(' '));
                }
                result = words.slice(0, quantity).join(' ');
            }

            if (startWithLorem) {
                const prefix = "Lorem ipsum dolor sit amet, consectetur adipiscing elit. ";
                if (!result.toLowerCase().startsWith("lorem ipsum")) {
                    result = prefix + result.charAt(0).toLowerCase() + result.slice(1);
                }
            }

            output.innerText = result;
        }

        function getRandomPhrase() {
            const phrase = phrases[Math.floor(Math.random() * phrases.length)];
            return phrase.charAt(0).toUpperCase() + phrase.slice(1);
        }

        function copyResult() {
            const text = document.getElementById('output-text').innerText;
            if (!text) return;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.querySelector('.btn-secondary');
                const original = btn.innerText;
                btn.innerText = "Copied!";
                setTimeout(() => btn.innerText = original, 1500);
            });
        }

        generateLorem();
    </script>
</body>
</html>
