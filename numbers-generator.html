<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Number Generator | ToolFast</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header></header>

    <main class="container">
        <section class="tool-card">
            <h1>Random Number Generator</h1>
            <p>Pick a random number within your chosen range.</p>
            
            <div style="margin: 2rem 0; display: flex; flex-direction: column; gap: 15px; text-align: left;">
                <div style="display: flex; gap: 10px;">
                    <div style="flex: 1;">
                        <label for="min-val" style="display: block; font-weight: bold; margin-bottom: 5px;">Min</label>
                        <input type="number" id="min-val" value="1" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd;">
                    </div>
                    <div style="flex: 1;">
                        <label for="max-val" style="display: block; font-weight: bold; margin-bottom: 5px;">Max</label>
                        <input type="number" id="max-val" value="100" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd;">
                    </div>
                </div>

                <div id="result-display" style="font-size: 3rem; margin: 1rem 0; text-align: center;">?</div>
                
                <button id="generate-btn" class="btn-primary">Generate Number</button>
            </div>
        </section>
    </main>

    <footer></footer>

    <script src="components.js"></script>
    <script>
        document.getElementById('generate-btn').addEventListener('click', function() {
            const min = parseInt(document.getElementById('min-val').value);
            const max = parseInt(document.getElementById('max-val').value);
            const display = document.getElementById('result-display');

            if (isNaN(min) || isNaN(max)) {
                display.innerText = "Error";
                return;
            }

            if (min >= max) {
                display.innerText = "Invalid Range";
                display.style.fontSize = "1.5rem";
                return;
            }

            display.style.fontSize = "3rem";
            // Formula per includere sia il min che il max
            const randomNumber = Math.floor(Math.random() * (max - min + 1)) + min;
            
            // Effetto "caricamento" veloce per rendere il tool più dinamico
            display.style.opacity = "0.3";
            setTimeout(() => {
                display.innerText = randomNumber;
                display.style.opacity = "1";
            }, 100);
        });
    </script>
</body>
</html>
